<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التسعير - الاتحاد</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(180deg,#000000,#0b0f1c);
    font-family:Arial,sans-serif;
    direction:rtl;
    color:white;
    height:100vh;
    overflow:hidden;
}

.container{
    width:95%;
    height:100vh;
    margin:auto;
    padding-top:3vh;
    text-align:center;
}

h1{
    font-size:6vh;
    color:#1f6fff;
    margin:0;
}

.company{
    font-size:2.5vh;
    letter-spacing:3px;
    color:#f4c430;
    margin-bottom:4vh;
}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 1vh;
}

th{
    background:linear-gradient(90deg,#1f3c88,#0d6efd);
    font-size:3vh;
    padding:1.5vh;
}

td{
    font-size:5vh;
    padding:2vh;
    font-weight:bold;
    background:rgba(255,255,255,0.05);
}

td:nth-child(2){
    color:#00e676;
}

td:nth-child(3){
    color:#f4c430;
}

.flag-img{
    width:60px;
    height:40px;
    object-fit:cover;
    border-radius:4px;
}

.pair{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
}

</style>
</head>
<body>

<div class="container">

<h1>أسعار الصرافة</h1>
<div class="company">AL-ITTIHAD EXCHANGE</div>

<table>
<tr>
<th>الزوج</th>
<th>شراء</th>
<th>بيع</th>
</tr>

<tr>
<td>
<div class="pair">
<img class="flag-img" src="https://flagcdn.com/w80/us.png">
<span>/</span>
<img class="flag-img" src="https://flagcdn.com/w80/sy.png">
</div>
</td>
<td id="buy1">11800</td>
<td id="sell1">11900</td>
</tr>

<tr>
<td>
<div class="pair">
<img class="flag-img" src="https://flagcdn.com/w80/tr.png">
<span>/</span>
<img class="flag-img" src="https://flagcdn.com/w80/sy.png">
</div>
</td>
<td id="buy2">268</td>
<td id="sell2">272</td>
</tr>

<tr>
<td>
<div class="pair">
<img class="flag-img" src="https://flagcdn.com/w80/eu.png">
<span>/</span>
<img class="flag-img" src="https://flagcdn.com/w80/sy.png">
</div>
</td>
<td id="buy3">13450</td>
<td id="sell3">13600</td>
</tr>

<tr>
<td>
<div class="pair">
<img class="flag-img" src="https://flagcdn.com/w80/us.png">
<span>/</span>
<img class="flag-img" src="https://flagcdn.com/w80/tr.png">
</div>
</td>
<td id="buy4">43.7</td>
<td id="sell4">44</td>
</tr>

<tr>
<td>
<div class="pair">
<img class="flag-img" src="https://flagcdn.com/w80/eu.png">
<span>/</span>
<img class="flag-img" src="https://flagcdn.com/w80/us.png">
</div>
</td>
<td id="buy5">1.14</td>
<td id="sell5">1.16</td>
</tr>

</table>

<script>
// تحميل الأسعار من localStorage إذا كنت تستخدمها
for(let i=1;i<=5;i++){
    let buy = localStorage.getItem("buy"+i);
    let sell = localStorage.getItem("sell"+i);
    if(buy) document.getElementById("buy"+i).innerText = buy;
    if(sell) document.getElementById("sell"+i).innerText = sell;
}
</script>

</div>

</body>
</html>
